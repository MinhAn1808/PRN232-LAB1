services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: prn232-lms-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  db-seed:
    image: mcr.microsoft.com/mssql-tools
    container_name: prn232-lms-db-seed
    profiles:
      - seed
    volumes:
      - ./docker/sql:/scripts
    command: >
      /bin/bash -c "
      until /opt/mssql-tools/bin/sqlcmd -S db -U sa -P Your_password123 -Q 'SELECT 1';
      do sleep 5;
      done;
      /opt/mssql-tools/bin/sqlcmd -S db -U sa -P Your_password123 -d PRN232_LMS -i /scripts/seed.sql
      "
    depends_on:
      - db

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prn232-lms-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=PRN232_LMS;User ID=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=True"
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  sqlserver-data:
